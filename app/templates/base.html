<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SportsBet{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f1923; color: #e0e0e0; }
        a { text-decoration: none; }

        /* Navbar */
        .navbar-custom { background: #111e2b; border-bottom: 1px solid #1e3048; padding: 12px 0; margin-bottom: 2rem; }
        .navbar-brand { font-weight: 700; color: #fff !important; font-size: 1.1rem; }
        .nav-link-admin { background: #1e1e3a; color: #9a9ae0 !important; border: 1px solid #2a2a4a; border-radius: 6px; padding: 5px 14px; font-size: .85rem; }
        .nav-link-admin:hover { background: #2a2a5a; color: #fff !important; }

        /* Match card */
        .match-card { background: #1a2634; border: 1px solid #2a3a4a; border-radius: 10px; margin-bottom: 8px; padding: 12px 20px; display: flex; align-items: center; }
        .team { flex: 1; font-size: 0.95rem; }
        .team-home { text-align: right; padding-right: 14px; }
        .team-away { text-align: left; padding-left: 14px; }
        .score-block { min-width: 90px; text-align: center; }
        .score { font-size: 1.15rem; font-weight: 700; color: #fff; }
        .score-time { font-size: 0.85rem; color: #4a6a8a; font-weight: 600; }
        .match-date { font-size: 0.7rem; color: #4a6a8a; margin-top: 2px; }

        /* Badges */
        .badge-finished { background: #2a3a2a; color: #5db85d; }
        .badge-live     { background: #3a1a1a; color: #e05555; animation: pulse 1.5s infinite; }
        .badge-scheduled{ background: #252e38; color: #7a9ab5; }
        .status-badge { font-size: 0.65rem; padding: 2px 7px; border-radius: 20px; }

        /* Section label */
        .stage-header { font-size: 0.72rem; color: #5a7a9a; text-transform: uppercase; letter-spacing: .07em; padding: 16px 4px 6px; }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
<nav class="navbar-custom">
    <div class="container-fluid" style="max-width:1400px;padding:0 24px;">
        <div class="d-flex align-items-center gap-3">
            <a href="/" class="navbar-brand">SportsBet</a>
            {% if current_user and current_user.is_admin %}
            <a href="/admin" class="nav-link-admin">Админ</a>
            {% endif %}
            {% if current_user %}
            <span style="color:#4a6a8a;font-size:.85rem;margin-left:auto;">{{ current_user.username }}</span>
            <a href="/logout" style="color:#4a6a8a;font-size:.82rem;border:1px solid #2a3a4a;border-radius:6px;padding:4px 10px;">Выйти</a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="container-fluid" style="max-width:1400px;padding:0 24px;">
    {% block content %}{% endblock %}
</div>
</body>
</html>
