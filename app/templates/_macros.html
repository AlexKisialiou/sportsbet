{% macro role_badge(user) %}{% if user.is_bot %}<span title="AI" style="font-size:.6rem;font-weight:700;letter-spacing:.04em;color:#a78bfa;background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.35);border-radius:4px;padding:1px 4px;vertical-align:middle;">AI</span>{% elif user.is_superuser %}<span title="Супер Админ" style="font-size:.6rem;font-weight:700;letter-spacing:.04em;color:#9d6fff;background:rgba(157,111,255,.12);border:1px solid rgba(157,111,255,.3);border-radius:4px;padding:1px 4px;vertical-align:middle;">SA</span>{% elif user.is_admin %}<span title="Админ" style="font-size:.6rem;font-weight:700;letter-spacing:.04em;color:#5db85d;background:rgba(93,184,93,.12);border:1px solid rgba(93,184,93,.3);border-radius:4px;padding:1px 4px;vertical-align:middle;">А</span>{% endif %}{% endmacro %}

{% macro user_avatar(user, size_class='avatar-sm') %}
{% if user.is_bot %}
<span class="avatar {{ size_class }} avatar-bender">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <circle cx="50" cy="50" r="50" fill="#b8b8b8"/>
  <ellipse cx="50" cy="52" rx="38" ry="42" fill="#d0d0d0"/>
  <ellipse cx="31" cy="44" rx="13" ry="15" fill="white"/>
  <ellipse cx="69" cy="44" rx="13" ry="15" fill="white"/>
  <circle cx="33" cy="46" r="7" fill="#1a1a1a"/>
  <circle cx="71" cy="46" r="7" fill="#1a1a1a"/>
  <circle cx="36" cy="40" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="74" cy="40" r="2.5" fill="white" opacity="0.8"/>
  <line x1="18" y1="28" x2="44" y2="33" stroke="#4a4a4a" stroke-width="5" stroke-linecap="round"/>
  <line x1="82" y1="28" x2="56" y2="33" stroke="#4a4a4a" stroke-width="5" stroke-linecap="round"/>
  <rect x="16" y="64" width="68" height="36" rx="6" fill="#a0a0a0"/>
  <rect x="24" y="70" width="52" height="22" rx="3" fill="#888"/>
  <line x1="33" y1="70" x2="33" y2="92" stroke="#707070" stroke-width="2.5"/>
  <line x1="43" y1="70" x2="43" y2="92" stroke="#707070" stroke-width="2.5"/>
  <line x1="57" y1="70" x2="57" y2="92" stroke="#707070" stroke-width="2.5"/>
  <line x1="67" y1="70" x2="67" y2="92" stroke="#707070" stroke-width="2.5"/>
</svg>
</span>
{% else %}
<span class="avatar {{ size_class }}" style="{% if user.avatar_color %}background:{{ user.avatar_color }};{% endif %}font-size:{% if user.avatar_emoji %}1rem{% else %}.7rem{% endif %};">{{ user.avatar_emoji or user.display_name[0].upper() }}</span>
{% endif %}
{% endmacro %}
