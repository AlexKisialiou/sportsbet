<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsBet — Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f1923; color: #e0e0e0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #1a2634; border: 1px solid #2a3a4a; border-radius: 12px; padding: 36px 32px; width: 100%; max-width: 360px; }
        .login-title { font-weight: 700; font-size: 1.2rem; margin-bottom: 24px; color: #fff; }
        .form-control { background: #111e2b; border: 1px solid #2a3a4a; color: #fff; border-radius: 6px; }
        .form-control:focus { background: #111e2b; border-color: #5db85d; color: #fff; box-shadow: none; }
        .form-label { color: #7a9ab5; font-size: .85rem; }
        .btn-login { background: #1e3a1e; border: 1px solid #2d6a2d; color: #5db85d; width: 100%; padding: 9px; border-radius: 6px; font-weight: 600; }
        .btn-login:hover { background: #2a4a2a; color: #7acc7a; }
        .error-msg { color: #e05555; font-size: .83rem; margin-bottom: 14px; }
    </style>
</head>
<body>
<div class="login-box">
    <div class="login-title">SportsBet</div>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" name="username" class="form-control" autofocus autocomplete="username">
        </div>
        <div class="mb-4">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control" autocomplete="current-password">
        </div>
        <button type="submit" class="btn-login">Войти</button>
    </form>
</div>
</body>
</html>
