<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportsBet — Лига Чемпионов</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f1923; color: #e0e0e0; }
        .match-card { background: #1a2634; border: 1px solid #2a3a4a; border-radius: 12px; margin-bottom: 10px; padding: 14px 20px; display: flex; align-items: center; }
        .team { flex: 1; font-size: 0.95rem; }
        .team-home { text-align: right; padding-right: 12px; }
        .team-away { text-align: left; padding-left: 12px; }
        .score { min-width: 70px; text-align: center; font-size: 1.2rem; font-weight: 700; color: #fff; }
        .meta { font-size: 0.72rem; color: #7a9ab5; text-align: center; margin-top: 2px; }
        .btn-fetch { background: #1e3048; color: #7ab5e0; border: 1px solid #2a4a6a; padding: 10px 28px; border-radius: 8px; font-size: 0.95rem; cursor: pointer; }
        .btn-fetch:hover { background: #253d5c; color: #fff; }
        .spinner { display: none; width: 20px; height: 20px; border: 2px solid #7a9ab5; border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error-msg { color: #e05555; font-size: 0.85rem; }
        .stage-label { font-size: 0.7rem; background: #1e3048; color: #5d9ab8; padding: 2px 8px; border-radius: 20px; }
    </style>
</head>
<body>
<div class="container py-4" style="max-width:700px">

    <div class="d-flex align-items-center mb-4">
        <a href="/" style="color:#7a9ab5;text-decoration:none;font-size:.85rem;">← Главная</a>
        <h5 class="mb-0 fw-bold text-white ms-3">Лига Чемпионов</h5>
    </div>

    <div class="text-center mb-4">
        <button class="btn-fetch" id="fetchBtn" onclick="loadMatches()">
            Загрузить последние матчи
        </button>
        <div class="spinner mt-3" id="spinner"></div>
        <p class="error-msg mt-2" id="errorMsg"></p>
    </div>

    <div id="matchList"></div>

</div>

<script>
async function loadMatches() {
    document.getElementById("fetchBtn").disabled = true;
    document.getElementById("spinner").style.display = "block";
    document.getElementById("errorMsg").textContent = "";
    document.getElementById("matchList").innerHTML = "";

    try {
        const resp = await fetch("/api/cl-matches");
        const data = await resp.json();

        if (data.error) {
            document.getElementById("errorMsg").textContent = "Ошибка: " + data.error;
            return;
        }

        const container = document.getElementById("matchList");
        const stageMap = {
            "GROUP_STAGE": "Группа", "LAST_16": "1/8 финала",
            "QUARTER_FINALS": "1/4 финала", "SEMI_FINALS": "1/2 финала",
            "FINAL": "Финал"
        };

        data.forEach(m => {
            const stage = stageMap[m.stage] || m.stage;
            container.innerHTML += `
                <div class="match-card">
                    <div class="team team-home">${m.home}</div>
                    <div>
                        <div class="score">${m.home_score} : ${m.away_score}</div>
                        <div class="meta">${m.date}</div>
                        <div class="meta"><span class="stage-label">${stage}</span></div>
                    </div>
                    <div class="team team-away">${m.away}</div>
                </div>`;
        });

        if (data.length === 0) {
            container.innerHTML = '<p class="text-secondary text-center">Матчи не найдены.</p>';
        }
    } catch (e) {
        document.getElementById("errorMsg").textContent = "Не удалось загрузить данные.";
    } finally {
        document.getElementById("spinner").style.display = "none";
        document.getElementById("fetchBtn").disabled = false;
    }
}
</script>
</body>
</html>
